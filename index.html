<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="format-detection" content="telephone=no">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body,html{margin:0;padding:0;-webkit-text-size-adjust:100%}
#root{background:linear-gradient(160deg,#d4ede4 0%,#e8f5f0 50%,#fef9ec 100%);min-height:100vh}
.ns::-webkit-scrollbar{display:none}
textarea,input,select,button{font-family:var(--font-sans);font-size:16px}
input,select,textarea{font-size:16px!important}
input,select,textarea{background:#fff!important;border-color:#c5ddd6!important;color:#1a1a1a!important}
input:focus,select:focus,textarea:focus{border-color:#0F6E56!important;outline:none!important;box-shadow:0 0 0 3px rgba(15,110,86,0.12)!important}
button{cursor:pointer;-webkit-appearance:none;touch-action:manipulation}
@keyframes spin{to{transform:rotate(360deg)}}
.ns{-webkit-overflow-scrolling:touch}
@supports(height:100dvh){#root{min-height:100dvh}}
select{-webkit-appearance:none;appearance:none}
</style>
</head>

// ── Team C Performance Evaluation ────────────────────────────────────────────
function evalTeamC(e,mon,daily,collBills,hvUnits,attendance,teamwork,sk){
  const md=gmData(e.id,mon,daily);
  // ── ① SALES 50% ──────────────────────────────────────────────────────────
  const col=(collBills[e.id]&&collBills[e.id][mon])||0;
  const colS=Math.round(Math.min(col/20000,1)*25*10)/10;
  const qtyS=Math.round(Math.min(md.qty/70,1)*15*10)/10;
  const hvu=(hvUnits[e.id]&&hvUnits[e.id][mon])||0;
  const hvuRatio=md.qty>0?hvu/md.qty:0;
  const hvuS=Math.round(Math.min(hvuRatio/0.1,1)*10*10)/10;
  // ── ② SERVICE 30% ────────────────────────────────────────────────────────
  const revS=Math.round(Math.min(md.review/20,1)*15*10)/10;
  // SOP: latest skill assessment avg → 0-100 scale
  const empSk=sk[e.id]||{};
  const skMons=Object.keys(empSk).sort().reverse();
  let sopPct=0;
  if(skMons.length){
    const latest=empSk[skMons[0]];
    const phase=latest.end||latest.mid||{};
    const vals=Object.values(phase).filter(v=>typeof v==='number');
    if(vals.length)sopPct=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length/10*100);
  }
  // ≥80%→15pts, <50%→0pts, middle→linear interpolation
  const sopS=sopPct>=80?15:sopPct<50?0:Math.round((sopPct-50)/30*15*10)/10;
  // ── ③ ATTITUDE 20% ───────────────────────────────────────────────────────
  // Absences: 0→10, 1→7, 2→3, ≥3→0
  const abs=(attendance[e.id]&&attendance[e.id][mon])||0;
  const absS=abs===0?10:abs===1?7:abs===2?3:0;
  // Teamwork: Team A gives 0-10 score + comment
  const tw=(teamwork[e.id]&&teamwork[e.id][mon])||{score:0,comment:''};
  const twS=Math.round(Math.min((tw.score||0)/10,1)*10*10)/10;
  // ── TOTALS ────────────────────────────────────────────────────────────────
  const salesTotal=Math.round((colS+qtyS+hvuS)*10)/10;
  const serviceTotal=Math.round((revS+sopS)*10)/10;
  const attitudeTotal=Math.round((absS+twS)*10)/10;
  const total=Math.round((salesTotal+serviceTotal+attitudeTotal)*10)/10;
  return{
    col:{s:colS,a:col,t:20000},
    qty:{s:qtyS,a:md.qty,t:70},
    hvu:{s:hvuS,a:hvu,tot:md.qty,ratio:Math.round(hvuRatio*1000)/10},
    rev:{s:revS,a:md.review,t:20},
    sop:{s:sopS,pct:sopPct},
    abs:{s:absS,a:abs},
    tw:{s:twS,a:tw.score||0,comment:tw.comment||''},
    salesTotal,serviceTotal,attitudeTotal,total
  };
}

  // ── TEAM A DASHBOARD ────────────────────────────────────────────────────────
  function aTeamDash(){
    const teamEmps=emps.filter(e=>e.active&&e.tier!=='Owner'&&e.tier!=='Team A'&&e.branch===(user&&user.branch));
    const today=new Date();
    const daysSinceMon=today.getDay()===0?6:today.getDay()-1;
    const dim=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
    const el=Math.max(today.getDate(),1);

    // ── Skill helpers ────────────────────────────────────────────────────────
    const empSkPct=(id)=>{
      for(const mon of [...KPI_MONTHS].reverse()){
        const d=getSkData(sk,id,mon);
        if(d&&d.current&&d.current.length)return Math.round(skT(d.current)/(d.current.length*10)*100);
      }
      return 0;
    };
    const empSkDelta=(id)=>{
      const mons=[...KPI_MONTHS].reverse();let arr=[];
      for(const m of mons){const d=getSkData(sk,id,m);if(d&&d.current&&d.current.length)arr.push(Math.round(skT(d.current)/(d.current.length*10)*100));}
      return arr.length>=2?arr[0]-arr[1]:0;
    };

    // ── Submission ───────────────────────────────────────────────────────────
    const subStatus=teamEmps.map(e=>{
      const key=String(e.id)+'_'+CUR_WEEK;const rec=growth[key]||{};
      const submitted=!!(rec.proudMoment||rec.challenge||rec.learning||rec.breakthrough);
      return{e,submitted};
    });
    const submitted=subStatus.filter(x=>x.submitted);
    const missing=subStatus.filter(x=>!x.submitted);

    // ── Coaching completion ──────────────────────────────────────────────────
    const coached=teamEmps.filter(e=>{
      const rec=growth[String(e.id)+'_'+CUR_WEEK]||{};
      return !!(rec.coachObs||rec.coachIssue||rec.coachAdvice||rec.coachFollowUp);
    });
    const coachRate=teamEmps.length?Math.round(coached.length/teamEmps.length*100):0;

    // ── Risk signals ─────────────────────────────────────────────────────────
    const riskData=teamEmps.map(e=>{
      let score=0;const signals=[];
      const rec=growth[String(e.id)+'_'+CUR_WEEK]||{};
      if(!(rec.proudMoment||rec.challenge)){score+=2;signals.push(tr('📭 本周未提交','📭 No review'));}
      const att=(attendance[e.id]&&attendance[e.id][NOW_M])||0;
      if(att>=3){score+=3;signals.push(tr('🚨 缺勤≥3次','🚨 Absent ≥3×'));}
      else if(att===2){score+=2;signals.push(tr('⚠️ 缺勤2次','⚠️ Absent 2×'));}
      else if(att===1){score+=1;signals.push(tr('📍 缺勤1次','📍 Absent 1×'));}

        else if(rate<0.8){score+=1;signals.push(tr('📊 KPI预测<80%','📊 KPI <80%'));}
      }
      const delta=empSkDelta(e.id);
      if(delta<=-5){score+=2;signals.push(tr('📉 技能分下降','📉 Skill dropped'));}
      const recs=Object.entries(growth).filter(([k])=>k.startsWith(String(e.id)+'_')).map(([,v])=>v).filter(v=>v.challenge).sort((a,b)=>(b.week||'').localeCompare(a.week||'')).slice(0,3);
      if(recs.length>=2){
        const seg=(s)=>s.split(/[\s,，。！？、]+/).filter(w=>w.length>1);
        const w0=new Set(seg(recs[0].challenge));
        if(seg(recs[1].challenge).filter(w=>w0.has(w)).length>=2){score+=1;signals.push(tr('🔄 挑战重复','🔄 Recurring challenge'));}
      }
      const recent=Object.entries(growth).filter(([k])=>k.startsWith(String(e.id)+'_')).map(([,v])=>v).sort((a,b)=>(b.week||'').localeCompare(a.week||'')).slice(0,2);
      if(recent.length>=2&&recent.every(r=>!r.breakthrough)){score+=1;signals.push(tr('🎯 两周无突破目标','🎯 No goal 2wks'));}
      return{e,score,signals,risk:score>=5?'high':score>=2?'medium':'low'};
    }).sort((a,b)=>b.score-a.score);

    const highRisk=riskData.filter(x=>x.risk==='high');

      count:acc.count+1,
      sales:acc.sales+(x.sales||0),
      qty:acc.qty+(x.qty||0),
      sL:acc.sL+(x.sL||0),
      sB:acc.sB+(x.sB||0),
      rL:acc.rL+(x.rL||0),
      rB:acc.rB+(x.rB||0),

              },[2022,2023,2024,2025,2026,2027,2028,2029,2030,2031,2032,2033,2034,2035,2036,2037,2038,2039,2040,2041,2042,2043,2044,2045,2046,2047,2048,2049,2050].map(y=>h('option',{key:y,value:y},y))),
              h('select',{style:{...S.inp,marginBottom:0,fontSize:12,flex:1},
                value:(e.joined||'').split('-')[1]||'01',
                onChange:ev=>{const y=(e.joined||'2024-01').split('-')[0]||'2024';setEmps(em=>em.map(x=>x.id===e.id?{...x,joined:y+'-'+ev.target.value}:x));}
              },['01','02','03','04','05','06','07','08','09','10','11','12'].map(m=>h('option',{key:m,value:m},tr(m+'月','Month '+m))))
            )
          )
        );
      })
    );

    // ── Section: Evaluate Team A ──
    const teamAEmps=emps.filter(e=>e.tier==='Team A'&&e.active);
    const evalSection=h('div',{style:{...S.card,marginTop:14}},
      h('div',{style:{...S.ttl,color:AMB2,marginBottom:10}},h('i',{className:'ti ti-star',style:{marginRight:6},'aria-hidden':'true'}),tr('Team A 评估','Team A Evaluation')),
      teamAEmps.length===0&&h('div',{style:{textAlign:'center',color:'var(--color-text-tertiary)',padding:'12px 0'}},tr('没有 Team A 成员','No Team A members')),
      teamAEmps.map(e=>{
        const mdA=gmData(e.id,NOW_M,daily);
        const tgtA=KPI_T['Team A']||{};
        const eoA=obs[e.id]||[];
        const t2=TIERS['Team A'];
        return h('div',{key:e.id,style:{border:`1px solid ${t2.c}30`,borderRadius:'var(--border-radius-md)',padding:'12px'}},
          h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:10}},
            h(Av,{name:e.name,sz:36,bg:t2.c}),
            h('div',null,h('div',{style:{fontWeight:500,fontSize:15}},e.name),h(TBdg,{tier:'Team A'}))
          ),
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}},
            tgtA.review&&h('div',{style:{background:'#f0faf6',borderRadius:'var(--border-radius-md)',padding:'8px',textAlign:'center'}},
              h('div',{style:{fontSize:10,color:TD}},tr('Google 评价数','Google Reviews')),
              h('div',{style:{fontSize:24,fontWeight:700,color:mdA.review>=(tgtA.review||0)?'var(--color-text-success)':'var(--color-text-secondary)'}},mdA.review),
              h('div',{style:{fontSize:10,color:'var(--color-text-tertiary)'}},tr('月尾表现','End of Month')+': '+tgtA.review)
            ),
            tgtA.meetings&&h('div',{style:{background:'#f0faf6',borderRadius:'var(--border-radius-md)',padding:'8px',textAlign:'center'}},
              h('div',{style:{fontSize:10,color:TD}},tr('会议次数','Meetings')),
              h('div',{style:{fontSize:24,fontWeight:700,color:mdA.meetings>=(tgtA.meetings||0)?'var(--color-text-success)':'var(--color-text-secondary)'}},mdA.meetings||0),
              h('div',{style:{fontSize:10,color:'var(--color-text-tertiary)'}},tr('月尾表现','End of Month')+': '+tgtA.meetings)
            )
          ),
          KPI_MONTHS.length>0&&h('div',{style:{marginBottom:10}},
            h('div',{style:{fontSize:12,fontWeight:600,color:'var(--color-text-secondary)',marginBottom:6}},tr('KPI 达标（近3个月）','KPI (Last 3 Months)')),
            h('div',{style:{display:'flex',gap:6}},
              KPI_MONTHS.map(m=>{const d=gmData(e.id,m,daily);const p=d.count>0&&kPass('Team A',d,empKpiT[e.id]);return h('div',{key:m,style:{flex:1,textAlign:'center',background:d.count>0?(p?'#dcfce7':'#fee2e2'):'#f0faf6',borderRadius:'var(--border-radius-md)',padding:'8px 4px'}},h('div',{style:{fontSize:10,color:'var(--color-text-secondary)'}},m),h('div',{style:{fontSize:13,fontWeight:700,color:d.count>0?(p?'var(--color-text-success)':'var(--color-text-danger)'):'var(--color-text-tertiary)'}},d.count>0?(p?'✓':'✗'):'—'));})
            )
          ),
          eoA.length>0&&h('div',{style:{marginBottom:10}},
            eoA.map((o,i)=>h('div',{key:i,style:{background:'#fef3c7',border:'1px solid #fde68a',borderRadius:'var(--border-radius-md)',padding:'8px 10px',marginBottom:4,fontSize:12}},
              h('div',{style:{fontSize:10,color:AMB2,fontWeight:600,marginBottom:2}},o.month+' · '+o.by),
              o.text
            ))
          ),
          obsEmp===e.id
            ?h('div',null,
              h('textarea',{style:{width:'100%',minHeight:70,resize:'vertical',fontSize:13,borderRadius:'var(--border-radius-md)',border:`1.5px solid ${AMB2}`,padding:'8px'},
                placeholder:'Write monthly evaluation for Team A...',
                value:obsText,onChange:ev=>setObsText(ev.target.value)
              }),
              h('div',{style:{display:'flex',gap:8,marginTop:6}},
                h('button',{style:{...S.btnP,background:AMB2,flex:1},onClick:()=>{
                  if(!obsText.trim())return;
                  setObs(o=>({...o,[e.id]:[...(o[e.id]||[]),{month:LATEST_M,text:obsText.trim(),by:user.name}]}));
                  setObsText('');setObsEmp(null);
                }},tr('保存','Save Evaluation')),
                h('button',{style:{...S.btn,flex:1},onClick:()=>setObsEmp(null)},tr('取消','Cancel'))
              )
            )
            :h('button',{style:{...S.btn,borderColor:AMB2,color:AMB2,width:'100%'},onClick:()=>setObsEmp(e.id)},
              h('i',{className:'ti ti-pencil',style:{marginRight:6},'aria-hidden':'true'}),tr('添加月度评估','Add Monthly Evaluation')
            )
        );
      })
    );

    return h('div',null,
      h('div',{style:{background:AMB2L,border:`1px solid ${AMB2}40`,borderRadius:'var(--border-radius-md)',padding:'10px 14px',marginBottom:14,display:'flex',alignItems:'center',gap:8}},
        h('i',{className:'ti ti-lock',style:{color:AMB2,fontSize:16},'aria-hidden':'true'}),
        h('span',{style:{fontSize:13,fontWeight:500,color:AMB2}},tr('Owner 设置','Owner Controls')),
        h('span',{style:{fontSize:12,color:'var(--color-text-secondary)',marginLeft:4}},tr('更改即时生效','Changes apply immediately'))
      ),
      tgtSection,
      detailSection,
      evalSection
    );
  }

  return h('div',{style:{fontFamily:'var(--font-sans)',color:'var(--color-text-primary)'}},
    showCPw&&CPwModal(),h(Header,{isAdmin:true}),
    h('div',{className:'ns',style:{display:'flex',background:'#fff',borderBottom:'2px solid #c8e6dc',overflowX:'auto'}},AT.filter(tb=>tb.id!=='settings'||isOwner).map(tb=>h('button',{key:tb.id,style:{flex:'0 0 auto',padding:'8px 10px',border:'none',borderBottom:tab===tb.id?`2px solid ${TEAL}`:'2px solid transparent',background:'transparent',color:tab===tb.id?TEAL:'var(--color-text-secondary)',cursor:'pointer',fontSize:11,fontWeight:tab===tb.id?500:400,display:'flex',flexDirection:'column',alignItems:'center',gap:2},onClick:()=>{setTab(tb.id);setSelEmp(null);setConfirmDeact(null);}},h('i',{className:`ti ${tb.icon}`,style:{fontSize:16},'aria-hidden':'true'}),tb.label))),
    tab==='my_overview'&&aMyOverview(),tab==='team_dash'&&aTeamDash(),tab==='dashboard'&&aDash(),tab==='staff'&&(isOwner?aStaff():aTeamManage()),tab==='skills'&&aSkills(),tab==='appts'&&renderAppts(true),tab==='upgrade'&&aUpgrade(),tab==='settings'&&isOwner&&aOwnerSettings(),tab==='my_kpi'&&aDailyLog(),
    h('div',{style:{padding:'8px',background:'#0F6E56',borderTop:'none',fontSize:11,color:'rgba(255,255,255,0.75)',textAlign:'center',borderRadius:'0 0 var(--border-radius-lg) var(--border-radius-lg)'}},tr('OiC Optical 员工成长系统 v9.0','OiC Optical Staff Growth System v9.0'))
  );
}

try{ReactDOM.render(h(App,null),document.getElementById('root'));}catch(e){var er=document.getElementById('err');var ro=document.getElementById('root');if(er)er.style.display='block';if(ro)ro.style.display='none';console.error('App error:',e);}</script>
</body>
</html>
